# ============================================================================
# CI — Lint, Test, Build
#
# Runs on every PR and push to main. Validates code quality, runs the
# test suite, and ensures the project builds successfully.
# ============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # -----------------------------------------------------------------------
  # Lint
  # -----------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Biome lint
        run: pnpm biome check --no-errors-on-unmatched .

      - name: TypeScript check (core)
        run: pnpm --filter @openscreen/core run build --noEmit
        continue-on-error: false

  # -----------------------------------------------------------------------
  # Test
  # -----------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run core tests
        run: pnpm --filter @openscreen/core run test

      - name: Run tests with coverage
        run: pnpm --filter @openscreen/core run test -- --coverage
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/core/coverage/
          retention-days: 14

  # -----------------------------------------------------------------------
  # Build
  # -----------------------------------------------------------------------
  build-desktop:
    name: Build Desktop
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Renderer
        run: pnpm --filter @openscreen/desktop run build

      - name: Package Electron App
        run: pnpm --filter @openscreen/desktop run package
        continue-on-error: true

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: apps/desktop/dist/
          retention-days: 7

  build-extension:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Extension
        run: pnpm --filter @openscreen/extension run build

      - name: Upload Extension
        uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: apps/extension/dist/
          retention-days: 7
